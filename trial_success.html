<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Success | JuniorCode</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary: #1d4ed8;
      --secondary: #0ea5e9;
      --dark: #0f172a;
      --muted: #64748b;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(29,78,216,0.1), transparent 30%),
        radial-gradient(circle at bottom right, rgba(14,165,233,0.1), transparent 30%),
        linear-gradient(180deg, #f8fbff, #eaf4ff);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    
    .check-icon {
      width: 80px;
      height: 80px;
      object-fit: contain;
      display: block;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      margin-bottom: 15px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .info {
      margin-bottom: 30px;
      font-weight: 600;
      color: #334155;
    }
    .title {
       font-size: clamp(1.8rem, 4vw, 3rem);
       font-weight: 900;
       margin-bottom: 15px;
}
    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      white-space: nowrap;
    }

    .btn-main {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 25px rgba(29,78,216,0.25);
    }

    .btn-outline {
      border: 1.5px solid #cfe3ff;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
      color: var(--dark);
      background: white;
    }

    .btn-main:hover,
    .btn-outline:hover {
      transform: translateY(-2px);
    }

  </style>
</head>

<body>

  <div class="success-container">

    <!-- ✅ Small Check Icon -->
    <img src="images/check-logo.png" class="check-icon" alt="success" />

    <!-- ✅ Title -->
    <h1 class="title">Registration Successful</h1>

    <!-- ✅ Subtitle -->
    <p class="subtitle">
      Your free trial request has been submitted successfully.  
      Our team will review your information and contact you shortly.
    </p>

    <!-- ✅ Info -->
    <div class="info">
      The admin will contact you soon with the next steps.
    </div>

    <!-- ✅ Buttons -->
    <div class="buttons">
      <a href="index.html" class="btn-main">Back to Home</a>
      <a href="index.html#trial" class="btn-outline">Book Another Trial</a>
    </div>

  </div>

</body>
</html>
