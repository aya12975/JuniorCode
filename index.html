<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JuniorCode Academy</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --secondary: #0ea5e9;
      --accent: #38bdf8;
      --dark: #0f172a;
      --muted: #64748b;
      --soft: #eff6ff;
      --white: #ffffff;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 28px 70px rgba(29, 78, 216, 0.18);
      --radius: 24px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.08), transparent 25%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.08), transparent 25%),
        linear-gradient(180deg, #f8fbff 0%, #eaf4ff 100%);
      color: var(--dark);
      overflow-x: hidden;
    }

    .logo-icon {
      height: 60px;
      width: auto;
      object-fit: contain;
      border-radius: 12px;
      
      border: 1px solid rgba(255, 255, 255, 0.2);
      
    }

    .logo-title {
      font-size: 24px;
      font-weight: 900;
      color: #0f172a;
    }

    .code-symbol {
      color: var(--primary);
      font-weight: 900;
    }

    .logo-sub {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      letter-spacing: 1.5px;
    }

    .section-padding {
      padding: 90px 0;
    }

    .navbar {
      transition: all 0.35s ease;
      background: rgba(255, 255, 255, 0.92) !important;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.05);
      padding-left: 20px;
      padding-right: 20px;
    }

    .navbar.scrolled {
      padding-top: 0.2rem;
      padding-bottom: 0.2rem;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      text-decoration: none;
      padding: 0;
      margin-right: 1rem;
    }

    .nav-link {
      color: #334155 !important;
      font-weight: 700;
      position: relative;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 4px;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.3s ease;
    }

    .nav-link:hover::after {
      transform: scaleX(1);
    }

    .btn-main {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: white;
      font-weight: 800;
      border-radius: 14px;
      padding: 12px 24px;
      box-shadow: 0 12px 28px rgba(29, 78, 216, 0.2);
      transition: all 0.3s ease;
    }

    .btn-main:hover {
      transform: translateY(-3px);
      color: white;
      box-shadow: 0 16px 32px rgba(29, 78, 216, 0.28);
    }

    .btn-outline-custom {
      border: 1.5px solid #cfe3ff;
      color: var(--dark);
      background: white;
      font-weight: 800;
      border-radius: 14px;
      padding: 12px 24px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-outline-custom:hover {
      transform: translateY(-3px);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 110px;
      position: relative;
    }

    .hero-centered {
      padding-bottom: 60px;
    }

    .hero-centered .hero-title {
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-centered .hero-text {
      max-width: 680px;
    }

    

    .hero-badge,
    .section-badge {
      display: inline-block;
      background: rgba(14, 165, 233, 0.12);
      color: #075985;
      border: 1px solid rgba(14, 165, 233, 0.2);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .hero-title {
      font-size: clamp(2.3rem, 5vw, 4.7rem);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .hero-text {
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.8;
      max-width: 620px;
    }

    .age-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 0.9rem;
      font-weight: 800;
      margin-right: 8px;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
    }

    .age-pill:hover {
      transform: translateY(-2px);
    }

    .mini-stat {
      background: white;
      border: 1px solid #e0ecff;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: all 0.35s ease;
    }

    .mini-stat:hover {
      transform: translateY(-8px);
    }

    .hero-visual {
      min-height: 100%;
      padding: 2rem;
      background:
        radial-gradient(circle at 80% 15%, rgba(56, 189, 248, 0.18), transparent 22%),
        radial-gradient(circle at 12% 80%, rgba(29, 78, 216, 0.13), transparent 24%),
        linear-gradient(150deg, #eff6ff, #ffffff);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .floating-badge {
      position: absolute;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #dbeafe;
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 12px 16px;
      font-weight: 800;
      color: #334155;
      animation: floatY 4s ease-in-out infinite;
      z-index: 2;
    }

    .badge-top {
      top: 24px;
      right: 24px;
    }

    .badge-bottom {
      bottom: 24px;
      left: 24px;
      animation-delay: 1.4s;
    }

    .hero-img {
      width: 100%;
      max-width: 540px;
      height: auto;
      margin: auto;
      display: block;
      animation: floatY 5s ease-in-out infinite;
      filter: drop-shadow(0 18px 30px rgba(29, 78, 216, 0.18));
      position: relative;
      z-index: 1;
      object-fit: contain;
      border-radius: 28px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      animation: floatY 6s ease-in-out infinite;
      z-index: 0;
    }

    .orb.one {
      width: 18px;
      height: 18px;
      background: var(--secondary);
      top: 80px;
      left: 50px;
    }

    .orb.two {
      width: 14px;
      height: 14px;
      background: var(--accent);
      top: 160px;
      right: 70px;
      animation-delay: 1s;
    }

    .orb.three {
      width: 16px;
      height: 16px;
      background: var(--primary);
      bottom: 90px;
      right: 40px;
      animation-delay: 2s;
    }

    .section-title {
      font-size: clamp(1.8rem, 3vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .section-text {
      color: var(--muted);
      max-width: 760px;
      margin: 0 auto;
      line-height: 1.8;
    }

    .feature-card,
    .course-card,
    .pricing-card,
    .testimonial-card,
    .cta-card {
      border: none;
      border-radius: 28px;
      box-shadow: var(--shadow);
      background: white;
      height: 100%;
      transition: all 0.35s ease;
    }

    .feature-card:hover,
    .course-card:hover,
    .testimonial-card:hover,
    .cta-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 24px 50px rgba(15, 23, 42, 0.12);
    }

    .icon-box {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      margin-bottom: 18px;
    }

    .course-pill {
      background: #e0f2fe;
      color: #0369a1;
      font-size: 0.85rem;
      font-weight: 800;
      border-radius: 999px;
      padding: 6px 12px;
    }

    .offer-box {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border-radius: 30px;
      box-shadow: 0 24px 50px rgba(29, 78, 216, 0.28);
      position: relative;
      overflow: hidden;
    }

    .offer-box::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      top: -60px;
      right: -50px;
    }

    .offer-box::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      bottom: -40px;
      left: -30px;
    }

    .offer-box .form-control,
    .offer-box .form-select {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      position: relative;
      z-index: 2;
    }

    .btn-light-strong {
      background: white;
      color: var(--primary-dark);
      font-weight: 800;
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      position: relative;
      z-index: 2;
      transition: all 0.3s ease;
    }

    .btn-light-strong:hover {
      transform: translateY(-2px) scale(1.01);
    }

    .pricing-card {
      padding: 2.2rem;
    }

    .pricing-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 26px 55px rgba(15, 23, 42, 0.12);
    }

    .popular {
      border: 2px solid var(--primary);
      position: relative;
      transform: translateY(-12px);
    }

    .popular-badge {
      position: absolute;
      top: 18px;
      right: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: 0 12px 24px rgba(29, 78, 216, 0.22);
    }

    .price {
      font-size: 3rem;
      font-weight: 900;
      margin: 18px 0 8px;
    }

    .pricing-item {
      color: var(--muted);
      margin-bottom: 0.8rem;
      line-height: 1.7;
    }

    .testimonial-card {
      padding: 2rem;
    }

    .stars {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .footer {
      background: linear-gradient(180deg, #0b1220, #0f172a);
      color: #dbe4f0;
      border-radius: 34px 34px 0 0;
      padding: 3rem 0;
      margin-top: 40px;
    }

    .footer h5,
    .footer h6 {
      color: white;
      font-weight: 800;
    }

    .footer a {
      color: #cbd5e1;
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .footer a:hover {
      color: white;
    }

    .brand-logo-img {
      height: 50px;
      width: 50px;
      object-fit: cover;
      border-radius: 14px;
      
    }

    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    .delay-1 { transition-delay: 0.1s; }
    .delay-2 { transition-delay: 0.2s; }
    .delay-3 { transition-delay: 0.3s; }
    .delay-4 { transition-delay: 0.4s; }

    .code-editor-card {
      background: #0d1526;
      border-radius: 20px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 28px 64px rgba(15, 23, 42, 0.35), 0 0 0 1px rgba(255,255,255,0.06);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .editor-header {
      background: #1a2540;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .editor-dots {
      display: flex;
      gap: 7px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }

    .editor-title {
      color: #94a3b8;
      font-size: 0.82rem;
      font-family: 'Courier New', monospace;
    }

    .editor-body {
      padding: 22px 24px;
    }

    .code-snippet {
      margin: 0;
      font-family: 'Courier New', monospace;
      font-size: 0.88rem;
      line-height: 1.95;
      color: #e2e8f0;
      white-space: pre;
      overflow-x: auto;
    }

    .code-comment { color: #64748b; font-style: italic; }
    .code-kw      { color: #c084fc; }
    .code-fn      { color: #60a5fa; }
    .code-str     { color: #4ade80; }
    .code-param   { color: #f97316; }
    .code-num     { color: #fb923c; }

    .editor-footer {
      background: #111e36;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .run-indicator     { font-size: 0.78rem; color: #60a5fa; font-family: monospace; }
    .success-indicator { font-size: 0.78rem; color: #4ade80; font-family: monospace; }

    .hero-achievement {
      position: absolute;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid #dbeafe;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: floatY 4s ease-in-out infinite;
      z-index: 2;
      min-width: 175px;
    }

    .achieve-icon  { font-size: 1.5rem; line-height: 1; }

    .achieve-title {
      font-weight: 800;
      font-size: 0.86rem;
      color: #0f172a;
      line-height: 1.3;
    }

    .achieve-sub {
      font-size: 0.76rem;
      color: #64748b;
      margin-top: 2px;
    }

    .top-achieve    { top: 20px; right: 20px; animation-delay: 0s; }
    .bottom-achieve { bottom: 20px; left: 20px; animation-delay: 1.5s; }

    /* ── Background blobs ── */
    .hero-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(72px);
      opacity: 0.13;
      pointer-events: none;
      animation: blobFloat 10s ease-in-out infinite;
    }
    .blob-1 { width: 420px; height: 420px; background: var(--primary);   top: 5%;    left: -8%;  animation-delay: 0s; }
    .blob-2 { width: 340px; height: 340px; background: var(--secondary); top: 30%;   right: -6%; animation-delay: 3.5s; }
    .blob-3 { width: 260px; height: 260px; background: var(--accent);    bottom: 8%; left: 38%;  animation-delay: 7s; }

    @keyframes blobFloat {
      0%,100% { transform: translate(0,0)      scale(1);    }
      33%      { transform: translate(18px,-22px) scale(1.04); }
      66%      { transform: translate(-14px,14px) scale(0.97); }
    }

    /* ── Typewriter cursor ── */
    .tw-cursor {
      display: inline-block;
      width: 3px;
      height: 0.82em;
      background: var(--primary);
      border-radius: 2px;
      margin-left: 2px;
      vertical-align: middle;
      animation: cursorBlink 0.75s step-end infinite;
    }
    @keyframes cursorBlink { 50% { opacity: 0; } }

    /* ── Interactive age pills ── */
    .age-pill { cursor: pointer; user-select: none; }
    .age-pill.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 8px 22px rgba(29,78,216,0.28);
    }

    /* ── Track description card ── */
    .track-desc-box {
      display: inline-block;
      background: rgba(14,165,233,0.07);
      border: 1px solid rgba(14,165,233,0.2);
      border-radius: 14px;
      padding: 12px 24px;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto 1.2rem;
      transition: all 0.35s ease;
      min-height: 52px;
    }

    /* ── CTA pulse ring ── */
    .btn-pulse { position: relative; overflow: visible; }
    .btn-pulse::after {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      opacity: 0;
      z-index: -1;
      animation: pulseRing 2.8s ease-out infinite;
    }
    @keyframes pulseRing {
      0%   { transform: scale(1);    opacity: 0.45; }
      70%  { transform: scale(1.14); opacity: 0; }
      100% { transform: scale(1.14); opacity: 0; }
    }

    @keyframes floatY {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 991px) {
      .hero {
        min-height: auto;
        padding-top: 110px;
      }

      .section-padding {
        padding: 65px 0;
      }

      .popular {
        transform: none;
      }

      .floating-badge {
        position: static;
        display: inline-block;
        margin-right: 10px;
        margin-bottom: 10px;
      }

      .hero-img {
        max-width: 420px;
      }

      .hero-visual {
        min-height: 360px;
      }
    }

    @media (max-width: 767px) {
      .section-padding {
        padding: 55px 0;
      }

      .logo-icon {
        height: 46px;
      }

      .logo-title {
        font-size: 20px;
      }

      .logo-sub {
        display: none;
      }

      .floating-badge {
        display: none !important;
      }

      .hero-achievement {
        display: none;
      }

      .code-editor-card {
        max-width: 100%;
      }

      .price {
        font-size: 2.4rem;
      }

      .pricing-card {
        padding: 1.8rem;
      }

      .footer {
        padding: 2.5rem 0;
        border-radius: 24px 24px 0 0;
      }

      .offer-box {
        border-radius: 22px;
      }
    }

    @media (max-width: 575px) {
      .section-padding {
        padding: 45px 0;
      }

      .navbar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .logo-icon {
        height: 40px;
      }

      .logo-title {
        font-size: 17px;
      }

      .hero {
        padding-top: 80px;
      }

      .hero-text {
        font-size: 0.97rem;
      }

      .hero-visual {
        min-height: 280px;
        padding: 1.5rem;
      }

      .code-snippet {
        font-size: 0.78rem;
      }

      .mini-stat {
        padding: 14px 10px;
      }

      .pricing-card {
        padding: 1.5rem;
      }

      .price {
        font-size: 2rem;
      }

      .footer {
        border-radius: 18px 18px 0 0;
      }

      .section-title {
        font-size: clamp(1.5rem, 6vw, 2.2rem);
      }

      .hero-badge,
      .section-badge {
        font-size: 0.8rem;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;
    emailjs.init("Y1FSyohqy-Hhh_-SA");

    const logo = "images/robot2.png.png";

    function useReveal() {
      useEffect(() => {
        const items = document.querySelectorAll(".reveal");

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("active");
              }
            });
          },
          { threshold: 0.15 }
        );

        items.forEach((item) => observer.observe(item));
        return () => observer.disconnect();
      }, []);
    }

    function useNavbarScroll() {
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener("scroll", onScroll);
        onScroll();
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      return scrolled;
    }

    function useTypewriter(words, speed = 95, pause = 1800) {
      const [display, setDisplay] = useState('');
      const [wordIdx, setWordIdx]   = useState(0);
      const [deleting, setDeleting] = useState(false);

      useEffect(() => {
        const current = words[wordIdx];
        let t;
        if (!deleting && display === current) {
          t = setTimeout(() => setDeleting(true), pause);
        } else if (deleting && display === '') {
          setDeleting(false);
          setWordIdx(i => (i + 1) % words.length);
        } else {
          t = setTimeout(() => {
            setDisplay(prev => deleting
              ? prev.slice(0, -1)
              : current.slice(0, prev.length + 1)
            );
          }, deleting ? speed / 2 : speed);
        }
        return () => clearTimeout(t);
      }, [display, deleting, wordIdx, words, speed, pause]);

      return display;
    }

    function CountUp({ to, suffix = "", decimals = 0 }) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        const steps = 55;
        const inc = to / steps;
        let cur = 0, step = 0;
        const t = setInterval(() => {
          step++;
          cur = Math.min(cur + inc, to);
          setVal(cur);
          if (step >= steps) clearInterval(t);
        }, 1500 / steps);
        return () => clearInterval(t);
      }, [to]);
      return <>{decimals ? val.toFixed(decimals) : Math.floor(val)}{suffix}</>;
    }
